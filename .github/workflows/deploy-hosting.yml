name: Deploy Hosting

# Builds the Vite frontend and deploys it to Firebase Hosting on every push
# to main. Replaces the Netlify deploy pipeline.
#
# Required repository secrets:
#   FIREBASE_TOKEN                       — `firebase login:ci`
#   VITE_FIREBASE_API_KEY                — from your local .env
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#   VITE_FIREBASE_MEASUREMENT_ID         — optional (analytics)
#
# The sibling `deploy-firebase.yml` workflow handles Firestore rules,
# Storage rules, and Cloud Functions. This one is hosting-only.

on:
  push:
    branches: [main]
    # Only skip paths that are unambiguously not part of the frontend build.
    paths-ignore:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "functions/**"
      - ".github/workflows/deploy-firebase.yml"
      - "**/*.md"
  workflow_dispatch:

# Kill in-flight builds when a newer commit lands so an older build can't
# overwrite a newer one (the race that bit us on Netlify).
concurrency:
  group: hosting-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Verify required secrets
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          missing=()
          [ -z "$FIREBASE_TOKEN" ] && missing+=("FIREBASE_TOKEN")
          [ -z "$VITE_FIREBASE_API_KEY" ] && missing+=("VITE_FIREBASE_API_KEY")
          [ -z "$VITE_FIREBASE_PROJECT_ID" ] && missing+=("VITE_FIREBASE_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}"
            echo "::error::Add them at Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:     ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase-tools@latest deploy \
            --only hosting \
            --non-interactive \
            --project examsprepzambia \
            --force
