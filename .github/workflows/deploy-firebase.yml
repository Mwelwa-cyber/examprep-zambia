name: Deploy Firebase

# Runs automatically on every push to main that touches any Firebase-related
# file. Also supports manual runs from the Actions tab (workflow_dispatch).
#
# Requires one GitHub repository secret:
#   FIREBASE_TOKEN — generated once locally with `firebase login:ci`
#
# The Netlify frontend deploys separately via Netlify's native GitHub
# integration (triggered by the same push). This workflow only handles
# Firebase: Firestore rules + indexes, Storage rules, and Cloud Functions.

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - firestore
          - functions
          - storage

# Prevent two deploys running over each other.
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Explicit minimum permissions — some org settings restrict actions
    # unless this is stated explicitly.
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install function dependencies
        working-directory: functions
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify FIREBASE_TOKEN secret is set
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN secret is not set in repository secrets."
            echo "::error::Generate one locally with: npx firebase-tools login:ci"
            echo "::error::Then add it as a secret at Settings > Secrets and variables > Actions."
            echo "::error::See DEPLOY.md for step-by-step instructions."
            exit 1
          fi
          echo "Token is present (length: ${#FIREBASE_TOKEN})"

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.target }}" in
              all)        echo "only=firestore,storage,functions" >> "$GITHUB_OUTPUT" ;;
              firestore)  echo "only=firestore"                    >> "$GITHUB_OUTPUT" ;;
              functions)  echo "only=functions"                    >> "$GITHUB_OUTPUT" ;;
              storage)    echo "only=storage"                      >> "$GITHUB_OUTPUT" ;;
            esac
          else
            # On push, deploy everything. Path filters already ensure this
            # workflow only runs when a Firebase-relevant file changed.
            echo "only=firestore,storage,functions" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase-tools@latest deploy \
            --only "${{ steps.target.outputs.only }}" \
            --non-interactive \
            --project examsprepzambia \
            --force
