name: Android Beta (App Distribution)

# Builds a debug Capacitor APK and ships it to Firebase App Distribution.
#
# Triggers
#   - Push to any `beta/**` branch (e.g. beta/0.2.0, beta/login-fix)
#   - Manual run from the Actions tab (workflow_dispatch) with a release-notes
#     input
#
# Required repository secrets
#   FIREBASE_TOKEN                       — `firebase login:ci` (already set;
#                                           reused from deploy-hosting.yml)
#   FIREBASE_ANDROID_APP_ID              — App ID for the Android app in
#                                           Firebase, looks like
#                                           1:NNNNNNNNNN:android:HEX. Find it
#                                           in Project Settings ▸ Your apps.
#   VITE_FIREBASE_API_KEY                — same .env values used by the
#   VITE_FIREBASE_AUTH_DOMAIN              hosting build; baked into the JS
#   VITE_FIREBASE_PROJECT_ID               bundle that runs inside the
#   VITE_FIREBASE_STORAGE_BUCKET           Capacitor WebView
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#   VITE_FIREBASE_MEASUREMENT_ID         — optional
#   VITE_GOOGLE_MAPS_STATIC_KEY          — optional
#
# Optional repository variables
#   APP_DISTRIBUTION_GROUPS              — comma-separated tester groups
#                                           (defaults to `testers`). Create
#                                           them in App Distribution ▸
#                                           Testers & groups.

on:
  push:
    branches: ["beta/**"]
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes shown to testers"
        required: false
        default: "Beta build from manual workflow dispatch"

concurrency:
  group: android-beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify required secrets
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: |
          missing=()
          [ -z "$FIREBASE_TOKEN" ] && missing+=("FIREBASE_TOKEN")
          [ -z "$FIREBASE_ANDROID_APP_ID" ] && missing+=("FIREBASE_ANDROID_APP_ID")
          [ -z "$VITE_FIREBASE_API_KEY" ] && missing+=("VITE_FIREBASE_API_KEY")
          [ -z "$VITE_FIREBASE_PROJECT_ID" ] && missing+=("VITE_FIREBASE_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}"
            echo "::error::Add them at Settings ▸ Secrets and variables ▸ Actions."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:     ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_MAPS_STATIC_KEY:      ${{ secrets.VITE_GOOGLE_MAPS_STATIC_KEY }}
        run: npm run build

      - name: Sync Capacitor Android assets
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Compose release notes
        id: notes
        env:
          INPUT_NOTES: ${{ github.event.inputs.release_notes }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REF_NAME: ${{ github.ref_name }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$INPUT_NOTES" ]; then
            notes="$INPUT_NOTES"
          else
            short_sha="${SHORT_SHA:0:7}"
            first_line="$(printf '%s' "$COMMIT_MSG" | head -n1)"
            notes="${REF_NAME} @ ${short_sha} — ${first_line}"
          fi
          {
            echo "value<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Distribute to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          GROUPS: ${{ vars.APP_DISTRIBUTION_GROUPS || 'testers' }}
          RELEASE_NOTES: ${{ steps.notes.outputs.value }}
        run: |
          npx -y firebase-tools@latest appdistribution:distribute \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --groups "$GROUPS" \
            --release-notes "$RELEASE_NOTES" \
            --token "$FIREBASE_TOKEN"
