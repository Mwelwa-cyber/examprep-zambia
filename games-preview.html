/* -------- Utilities -------- */
function mulberry32(seed){return function(){let t=seed+=0x6d2b79f5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function shuffle(arr, seed){const a=arr.slice();let s=seed>>>0;for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)>>>0;const j=s%(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function buildMathRound(gen, seed){
  const r=mulberry32(seed>>>0), out=[]
  const pick=(a,b)=>Math.floor(r()*(b-a+1))+a
  for(let i=0;i<30;i++){
    if(gen==='addSubSmall'){const a=pick(1,15),b=pick(1,Math.min(a,10)),op=r()<.5?'+':'−';out.push({prompt:`${a} ${op} ${b}`,answer:op==='+'?a+b:a-b})}
    else if(gen==='timesTables'){const a=pick(2,12),b=pick(2,12);out.push({prompt:`${a} × ${b}`,answer:a*b})}
    else if(gen==='mixedOps'){const m=pick(0,3);if(m===0){const a=pick(20,99),b=pick(10,50);out.push({prompt:`${a} + ${b}`,answer:a+b})}else if(m===1){const a=pick(20,99),b=pick(1,20);out.push({prompt:`${a} − ${b}`,answer:a-b})}else if(m===2){const a=pick(3,12),b=pick(2,9);out.push({prompt:`${a} × ${b}`,answer:a*b})}else{const b=pick(2,12),ans=pick(2,12);out.push({prompt:`${b*ans} ÷ ${b}`,answer:ans})}}
  }
  return out
}

/* -------- Quiz -------- */
function renderQuiz(set){
  const surface = document.getElementById('game-surface')
  let items = shuffle(set.items, Date.now())
  let idx = 0, picked = null, score = 0

  function draw(){
    if (picked !== null && idx >= items.length) {
      const pct = Math.round((score/items.length)*100)
      surface.innerHTML = `
        <div class="bg-white rounded-2xl border border-slate-200 p-8 text-center">
          <div class="text-6xl mb-3">${pct===100?'🏆':pct>=80?'🌟':pct>=60?'💪':'📚'}</div>
          <h2 class="text-3xl font-black mb-1">${pct}%</h2>
          <p class="text-slate-700 mb-6">${score} of ${items.length} correct.</p>
          <button id="again" class="px-5 py-3 rounded-xl font-black text-white bg-gradient-to-r from-emerald-500 to-teal-500">Play again 🔁</button>
        </div>`
      document.getElementById('again').onclick = () => { items=shuffle(set.items,Date.now()); idx=0;picked=null;score=0; draw() }
      return
    }
    const q = items[idx]
    const pct = Math.round((idx/items.length)*100)
    surface.innerHTML = `
      <div class="flex items-center gap-4 mb-4">
        <div class="flex-1 h-2.5 rounded-full bg-slate-200 overflow-hidden"><div class="h-full bg-gradient-to-r from-emerald-500 to-teal-500" style="width:${pct}%"></div></div>
        <div class="text-sm font-black">Score: <span class="text-emerald-700">${score}</span> / ${items.length}</div>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 p-6">
        <p class="text-xs font-black uppercase text-emerald-700 mb-2">Question ${idx+1} of ${items.length}</p>
        <h2 class="text-xl font-black mb-5">${q.q}</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="opts">
          ${q.options.map((o,i)=>`
            <button data-i="${i}" class="opt w-full text-left p-4 rounded-xl border-2 border-slate-200 bg-white hover:border-slate-400 font-bold">
              <span class="inline-block w-8 h-8 rounded-lg bg-slate-100 text-center leading-8 font-black mr-2">${String.fromCharCode(65+i)}</span>${o}
            </button>
          `).join('')}
        </div>
        <div id="fb" class="hidden mt-5 rounded-xl p-4 text-sm font-bold"></div>
      </div>
      <div class="mt-4 flex justify-end">
        <button id="next" disabled class="px-5 py-3 rounded-xl font-black text-white bg-gradient-to-r from-emerald-500 to-teal-500 disabled:opacity-50">Next →</button>
      </div>
    `
    picked = null
    document.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => {
      if (picked!==null) return
      picked = +b.dataset.i
      const fb = document.getElementById('fb')
      const ok = picked === q.answer
      if (ok) score++
      document.querySelectorAll('.opt').forEach((el,i)=>{
        if (i===q.answer) el.className = 'opt w-full text-left p-4 rounded-xl border-2 border-emerald-400 bg-emerald-50 text-emerald-900 font-bold'
        else if (i===picked) el.className = 'opt w-full text-left p-4 rounded-xl border-2 border-rose-400 bg-rose-50 text-rose-900 font-bold'
        else el.className = 'opt w-full text-left p-4 rounded-xl border-2 border-slate-200 bg-slate-50 opacity-60 font-bold'
        el.disabled = true
      })
      fb.className = `mt-5 rounded-xl p-4 text-sm font-bold ${ok?'bg-emerald-50 border border-emerald-200 text-emerald-900':'bg-rose-50 border border-rose-200 text-rose-900'}`
      fb.textContent = (ok?'✅ Correct! ':'❌ Not quite. ') + q.explain
      document.getElementById('next').disabled = false
    }))
    document.getElementById('next').onclick = () => { idx++; picked = 1; draw() }
  }
  draw()
}

/* -------- Memory -------- */
function renderMemory(set){
  const surface = document.getElementById('game-surface')
  let deck = [], flipped = [], matched = [], moves = 0, startedAt = null
  set.pairs.forEach((p,i)=>{deck.push({pairId:i,label:p.a});deck.push({pairId:i,label:p.b})})
  deck = shuffle(deck, Date.now())

  function draw(){
    const cols = deck.length <= 12 ? 4 : 6
    surface.innerHTML = `
      <div class="flex gap-2 mb-4">
        <div class="flex-1 bg-white border rounded-xl p-2 text-center"><div class="text-[10px] font-black uppercase text-slate-500">Matches</div><div class="text-lg font-black">${matched.length/2} / ${set.pairs.length}</div></div>
        <div class="flex-1 bg-white border rounded-xl p-2 text-center"><div class="text-[10px] font-black uppercase text-slate-500">Moves</div><div class="text-lg font-black">${moves}</div></div>
      </div>
      <div class="grid gap-3" style="grid-template-columns:repeat(${cols},minmax(0,1fr))">
        ${deck.map((c,i)=>{
          const faceUp = flipped.includes(i) || matched.includes(i)
          const isMatched = matched.includes(i)
          const isEmoji = /\p{Extended_Pictographic}/u.test(c.label) && Array.from(c.label).length<=3
          if (!faceUp) return `<button data-i="${i}" class="card aspect-[3/4] rounded-2xl bg-gradient-to-br from-amber-400 to-orange-500 border-2 border-orange-600 text-white text-3xl flex items-center justify-center">🎴</button>`
          return `<div class="aspect-[3/4] rounded-2xl flex items-center justify-center p-2 text-center font-black border-2 ${isMatched?'bg-emerald-50 border-emerald-300 text-emerald-900':'bg-white border-amber-300'}"><span class="${isEmoji?'text-4xl':'text-sm leading-tight'}">${c.label}</span></div>`
        }).join('')}
      </div>
    `
    document.querySelectorAll('.card').forEach(b => b.addEventListener('click', () => {
      const i = +b.dataset.i
      if (flipped.length >= 2 || flipped.includes(i) || matched.includes(i)) return
      if (!startedAt) startedAt = Date.now()
      flipped.push(i)
      draw()
      if (flipped.length === 2) {
        moves++
        const [a,b2] = flipped
        if (deck[a].pairId === deck[b2].pairId) {
          setTimeout(()=>{matched.push(a,b2); flipped=[]; draw(); if (matched.length===deck.length) win()},400)
        } else {
          setTimeout(()=>{flipped=[]; draw()},900)
        }
      }
    }))
  }
  function win(){
    surface.innerHTML = `
      <div class="bg-white rounded-2xl border p-8 text-center">
        <div class="text-6xl mb-2">🎉</div>
        <h2 class="text-3xl font-black mb-1">All matched!</h2>
        <p class="text-slate-700 mb-6"><b>${moves}</b> moves</p>
        <button id="again" class="px-5 py-3 rounded-xl font-black text-white bg-gradient-to-r from-amber-500 to-orange-500">Play again 🔁</button>
      </div>`
    document.getElementById('again').onclick = () => { deck=[]; set.pairs.forEach((p,i)=>{deck.push({pairId:i,label:p.a});deck.push({pairId:i,label:p.b})}); deck=shuffle(deck,Date.now()); flipped=[];matched=[];moves=0;startedAt=null; draw() }
  }
  draw()
}

/* -------- Spelling -------- */
function renderSpelling(set){
  const surface = document.getElementById('game-surface')
  let pos = 0, correct = 0
  const order = shuffle(set.words.map((_,i)=>i), Date.now())
  let tiles = [], slots = []
  let target = ''

  function loadWord(){
    const w = set.words[order[pos]]
    target = w.word
    tiles = makeTiles(target)
    slots = Array(target.length).fill(null)
    draw(w)
  }
  function makeTiles(word){
    const arr = Array.from(word)
    const pool = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(l=>!word.includes(l))
    const decoys = word.length<=4?2:word.length<=6?1:0
    for(let i=0;i<decoys;i++){arr.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0])}
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
    return arr.map(l=>({letter:l,placed:false}))
  }
  function draw(w){
    const allFilled = slots.every(v=>v!==null)
    const guess = allFilled ? slots.map(i=>tiles[i].letter).join('') : ''
    const solved = guess === target
    const wrong = allFilled && !solved
    surface.innerHTML = `
      <div class="flex justify-between mb-4">
        <span class="text-xs font-black uppercase text-sky-700">Word ${pos+1} of ${order.length}</span>
        <span class="text-sm font-black">Solved: <span class="text-sky-700">${correct}</span></span>
      </div>
      <div class="bg-white rounded-2xl border p-6">
        <p class="text-center text-2xl mb-1">${w.clue.split(' ')[0]}</p>
        <p class="text-center text-slate-700 font-bold mb-6">${w.clue.replace(/^\S+\s/,'')}</p>
        <div class="flex flex-wrap justify-center gap-2 mb-6">
          ${slots.map((t,i)=>{const l=t!==null?tiles[t].letter:'';return `<button data-slot="${i}" class="slot w-12 h-14 rounded-xl border-2 font-black text-2xl flex items-center justify-center ${solved?'bg-emerald-50 border-emerald-400 text-emerald-900':wrong?'bg-rose-50 border-rose-400 text-rose-900':l?'bg-sky-50 border-sky-400 text-sky-900':'bg-slate-50 border-slate-300 border-dashed text-slate-400'}">${l||'_'}</button>`}).join('')}
        </div>
        <div class="flex flex-wrap justify-center gap-2">
          ${tiles.map((t,i)=>`<button data-tile="${i}" ${t.placed?'disabled':''} class="tile w-12 h-12 rounded-xl border-2 font-black text-xl ${t.placed?'bg-slate-100 border-slate-200 text-slate-300':'bg-white border-slate-300 text-slate-900 hover:bg-sky-50'}">${t.letter}</button>`).join('')}
        </div>
        ${solved?`<div class="mt-6 rounded-xl p-4 bg-emerald-50 border border-emerald-200 text-emerald-900 font-bold text-center">✅ Well done! That spells <b>${target}</b>.</div>`:''}
      </div>
      <div class="mt-4 flex justify-end"><button id="next" ${solved?'':'disabled'} class="px-5 py-3 rounded-xl font-black text-white bg-gradient-to-r from-sky-500 to-cyan-500 disabled:opacity-50">${pos+1>=order.length?'Finish 🏁':'Next word →'}</button></div>
    `
    document.querySelectorAll('.tile').forEach(b => b.addEventListener('click', () => {
      const i = +b.dataset.tile
      const empty = slots.findIndex(v=>v===null)
      if (empty===-1 || tiles[i].placed) return
      slots[empty]=i; tiles[i].placed=true
      if (slots.every(v=>v!==null) && slots.map(x=>tiles[x].letter).join('')===target) correct++
      draw(w)
    }))
    document.querySelectorAll('.slot').forEach(b => b.addEventListener('click', () => {
      const i = +b.dataset.slot
      if (slots[i]===null || solved) return
      tiles[slots[i]].placed=false; slots[i]=null
      draw(w)
    }))
    document.getElementById('next').onclick = () => {
      if (pos+1>=order.length){
        surface.innerHTML = `
          <div class="bg-white rounded-2xl border p-8 text-center">
            <div class="text-6xl mb-3">📚</div>
            <h2 class="text-3xl font-black mb-1">${correct} / ${order.length}</h2>
            <p class="text-slate-700 mb-6">${Math.round(correct/order.length*100)}% spelled correctly!</p>
            <button id="again" class="px-5 py-3 rounded-xl font-black text-white bg-gradient-to-r from-sky-500 to-cyan-500">Play again 🔁</button>
          </div>`
        document.getElementById('again').onclick = () => renderSpelling(set)
      } else { pos++; loadWord() }
    }
  }
  loadWord()
}

/* -------- Math -------- */
function renderMath(set){
  const surface = document.getElementById('game-surface')
  const qs = buildMathRound(set.generator, Date.now())
  let i = 0, correct = 0, wrong = 0, streak = 0, best = 0, t = set.durationSec, timer = null

  function ready(){
    surface.innerHTML = `
      <div class="bg-white rounded-2xl border p-8 text-center">
        <div class="text-6xl mb-3">⚡</div>
        <h2 class="text-3xl font-black mb-2">${set.title}</h2>
        <p class="text-slate-700 mb-6">You have <b>${set.durationSec} seconds</b>. No calculators!</p>
        <button id="start" class="px-6 py-3 rounded-xl font-black text-white bg-gradient-to-r from-rose-500 to-pink-500">Start sprint 🚀</button>
      </div>`
    document.getElementById('start').onclick = () => { play() }
  }
  function play(){
    draw()
    timer = setInterval(()=>{ t--; if (t<=0){ clearInterval(timer); done() } else tick() },1000)
  }
  function tick(){
    const bar = document.getElementById('bar'); if (bar) bar.style.width = Math.max(0,Math.round(t/set.durationSec*100))+'%'
    const tt = document.getElementById('tt'); if (tt){ tt.textContent = t+'s'; if (t<=10) tt.className = 'w-16 text-center font-black text-2xl tabular-nums text-rose-600' }
  }
  function draw(){
    const q = qs[i%qs.length]
    surface.innerHTML = `
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 h-3 rounded-full bg-slate-200 overflow-hidden"><div id="bar" class="h-full bg-gradient-to-r from-rose-500 to-pink-500" style="width:100%"></div></div>
        <div id="tt" class="w-16 text-center font-black text-2xl tabular-nums">${t}s</div>
      </div>
      <div class="flex gap-2 mb-4 text-sm font-black">
        <div class="flex-1 bg-emerald-50 border border-emerald-200 rounded-xl p-2 text-center"><div class="text-[10px] uppercase opacity-70">Correct</div><div class="text-xl">${correct}</div></div>
        <div class="flex-1 bg-slate-50 border rounded-xl p-2 text-center"><div class="text-[10px] uppercase opacity-70">Wrong</div><div class="text-xl">${wrong}</div></div>
        <div class="flex-1 bg-amber-50 border border-amber-200 rounded-xl p-2 text-center"><div class="text-[10px] uppercase opacity-70">Streak</div><div class="text-xl">${streak}</div></div>
      </div>
      <form id="f" class="bg-white rounded-3xl border-2 border-slate-200 p-10 text-center">
        <p class="text-xs font-black uppercase text-slate-500 mb-4">Question #${i+1}</p>
        <div class="text-6xl font-black mb-6 tracking-wide">${q.prompt} = ?</div>
        <input id="inp" type="number" inputmode="numeric" class="w-full max-w-xs mx-auto px-5 py-4 rounded-xl border-2 border-slate-300 text-3xl font-black text-center focus:outline-none focus:border-rose-500" />
        <div class="mt-5 flex gap-3 justify-center">
          <button type="submit" class="px-5 py-3 rounded-xl font-black text-white bg-gradient-to-r from-rose-500 to-pink-500">Submit ↵</button>
          <button type="button" id="skip" class="px-5 py-3 rounded-xl font-bold text-slate-700 bg-white border-2 border-slate-200">Skip</button>
        </div>
      </form>
    `
    const inp = document.getElementById('inp'); inp.focus()
    document.getElementById('f').onsubmit = (e) => {
      e.preventDefault()
      const v = Number(inp.value)
      if (inp.value === '') return
      if (v === q.answer){ correct++; streak++; if (streak>best) best = streak } else { wrong++; streak = 0 }
      i++; draw()
    }
    document.getElementById('skip').onclick = () => { wrong++; streak = 0; i++; draw() }
  }
  function done(){
    const total = correct + wrong
    const acc = total ? Math.round(correct/total*100) : 0
    surface.innerHTML = `
      <div class="bg-white rounded-2xl border p-8 text-center">
        <div class="text-6xl mb-3">⏱️</div>
        <h2 class="text-3xl font-black mb-1">Time!</h2>
        <div class="grid grid-cols-3 gap-3 max-w-md mx-auto my-6">
          <div class="bg-emerald-50 border-2 border-emerald-200 rounded-xl p-4"><div class="text-[10px] font-black uppercase opacity-70">Correct</div><div class="text-2xl font-black">${correct}</div></div>
          <div class="bg-rose-50 border-2 border-rose-200 rounded-xl p-4"><div class="text-[10px] font-black uppercase opacity-70">Accuracy</div><div class="text-2xl font-black">${acc}%</div></div>
          <div class="bg-amber-50 border-2 border-amber-200 rounded-xl p-4"><div class="text-[10px] font-black uppercase opacity-70">Best streak</div><div class="text-2xl font-black">${best}</div></div>
        </div>
        <button id="again" class="px-5 py-3 rounded-xl font-black text-white bg-gradient-to-r from-rose-500 to-pink-500">Play again 🔁</button>
      </div>`
    document.getElementById('again').onclick = () => renderMath(set)
  }
  ready()
}

renderHub()
</script>
