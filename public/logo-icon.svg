<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Blue rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#iconBg)"/>
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1a4fd6"/>
    </linearGradient>
  </defs>

  <!-- Open Book (white) -->
  <!-- Left page -->
  <path d="M20 68 Q30 61 50 59 L50 33 Q30 35 20 42 Z" fill="white" opacity="0.95"/>
  <!-- Right page -->
  <path d="M80 68 Q70 61 50 59 L50 33 Q70 35 80 42 Z" fill="white" opacity="0.85"/>
  <!-- Book spine -->
  <path d="M50 59 L50 33" stroke="#dbeafe" stroke-width="1.2"/>
  <!-- Bottom covers -->
  <path d="M18 70 Q27 76 49 74 L50 59 Q30 61 20 68 Z" fill="white" opacity="0.7"/>
  <path d="M82 70 Q73 76 51 74 L50 59 Q70 61 80 68 Z" fill="white" opacity="0.6"/>

  <!-- Green sprout -->
  <!-- Stem -->
  <path d="M50 33 L50 18" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M50 25 C43 21 38 15 42 10 C46 5 51 12 50 22 Z" fill="#86efac"/>
  <!-- Right leaf -->
  <path d="M50 22 C57 18 62 12 58 7 C54 2 49 9 50 19 Z" fill="#4ade80"/>
</svg>
