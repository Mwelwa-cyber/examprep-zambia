<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 200" fill="none">
  <!-- Open Book -->
  <!-- Left page -->
  <path d="M80 130 Q100 118 170 115 L170 68 Q100 71 80 83 Z" fill="#1a56db" stroke="#1a56db" stroke-width="1" stroke-linejoin="round"/>
  <!-- Right page -->
  <path d="M260 130 Q240 118 170 115 L170 68 Q240 71 260 83 Z" fill="#1a56db" stroke="#1a56db" stroke-width="1" stroke-linejoin="round"/>
  <!-- Book spine bottom shadow -->
  <path d="M170 115 L170 68" stroke="#1344a0" stroke-width="2"/>
  <!-- Book cover/bottom edge left -->
  <path d="M75 133 Q90 143 168 140 L170 115 Q100 118 80 130 Z" fill="#1344a0"/>
  <!-- Book cover/bottom edge right -->
  <path d="M265 133 Q250 143 172 140 L170 115 Q240 118 260 130 Z" fill="#1344a0"/>
  <!-- Book bottom spine -->
  <path d="M168 140 L172 140" stroke="#0d3280" stroke-width="1.5"/>

  <!-- Green plant / sprout from center of book -->
  <!-- Stem -->
  <path d="M170 68 L170 42" stroke="#22a84a" stroke-width="3" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M170 52 C158 44 148 36 155 26 C162 18 172 28 170 42 Z" fill="#34c95e"/>
  <!-- Right leaf -->
  <path d="M170 46 C182 38 192 30 185 20 C178 12 168 22 170 36 Z" fill="#22a84a"/>

  <!-- ZedExams wordmark -->
  <text
    x="170"
    y="162"
    text-anchor="middle"
    font-family="'Outfit', 'Nunito', Arial, sans-serif"
    font-weight="800"
    font-size="32"
    fill="#1a2b5e"
    letter-spacing="-0.5"
  >ZedExams</text>

  <!-- Tagline -->
  <text
    x="170"
    y="183"
    text-anchor="middle"
    font-family="'Outfit', 'Nunito', Arial, sans-serif"
    font-weight="600"
    font-size="14"
    fill="#1a2b5e"
    letter-spacing="0.3"
  >Practise smart.</text>
</svg>
