her so that there are lines on your face above your eyes Example: She frowned at me, clearly annoyed. Happiness (noun) Meaning: the feeling of being happy Example: It was only later in life that she found happiness and peace of mind. Eraser (noun) Meaning: a small piece of rubber used to remove the marks made by a pencil Example: If you draw or write in pencil you can always rub out your mistakes with an eraser. ROUND 3 (3 points) Adventure (noun) - an unusual, exciting, and possibly dangerous activity, such as a trip or experience, or the excitement produced by such an activity Carefully (adverb) - with great attention Terrible Delicious (adjective) - having a very pleasant taste or smell Recommend (verb) - to suggest that someone or something would be good or suitable for a particular job or purpose. Treatment (noun) - the way you deal with or behave toward someone or something Tie- Breakers (Oral Recitation) Recitation Bundle Hockey Hazardous Risky Chemicals Photographer Work Backwards However"
