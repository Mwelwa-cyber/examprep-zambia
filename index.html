<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>ZedExams</title>
    <meta name="description" content="ZedExams — Zambian CBC exam prep." />
    <meta name="author" content="ZedExams" />
    <link rel="canonical" href="https://zedexams.com/" />

    <!-- Viewport + theme -->
    <!--
      color-scheme:light opts the site OUT of the browser's auto-dark behaviour.
      Without this, form controls (<select>, date pickers, scrollbars, the pre-
      React paint, etc.) pick up the OS dark-mode palette and clash with the
      in-app ThemeProvider — the page reads as "a bit too dark" on dark-mode
      browsers. Users who want a dark palette can still pick Midnight from the
      theme switcher; OS preference just stops forcing it.
    -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#059669" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ZedExams" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/zedexams-logo.png?v=4" />
    <link rel="apple-touch-icon" href="/zedexams-logo.png?v=4" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZedExams" />
    <meta property="og:title" content="ZedExams" />
    <meta property="og:description" content="ZedExams — Zambian CBC exam prep." />
    <meta property="og:url" content="https://zedexams.com/" />
    <meta property="og:image" content="https://zedexams.com/zedexams-logo.png?v=4" />
    <meta property="og:image:alt" content="ZedExams" />
    <meta property="og:locale" content="en_ZM" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZedExams" />
    <meta name="twitter:description" content="ZedExams — Zambian CBC exam prep." />
    <meta name="twitter:image" content="https://zedexams.com/zedexams-logo.png?v=4" />

    <!-- Fonts — single CSS request, trimmed weights. Uses display=swap so text paints immediately. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@400;600;700;800&family=Lora:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    />

    <!-- Warm up the Firebase connections we'll open during auth so TLS isn't in the critical path -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firebaseinstallations.googleapis.com" />

    <!--
      Analytics (inactive by default).
      When ready to track launch traffic, uncomment ONE of these blocks:

      Option A — Plausible (recommended, privacy-friendly, cookie-less, $9/mo):
        <script defer data-domain="zedexams.com" src="https://plausible.io/js/script.js"></script>

      Option B — Google Analytics 4 (free, cookie-based):
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-XXXXXXXXXX');
        </script>
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
